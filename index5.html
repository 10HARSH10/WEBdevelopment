<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>

    <link href="style.css" rel="stylesheet">
    <!-- command to link the css and the reason -->
</head>
<body>
    <h1>hello</h1>
    <h1 class="hello">hello</h1>
    <!-- class can be defined multiple times -->
    <h1 id="hello">hello</h1>
    <!-- id cannot be repeated as it has to be unique -->
</body>
</html>
